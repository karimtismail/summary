name: Deploy Handbook to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "netty-engineering-handbook/**"
      - ".github/workflows/handbook-pages.yml"
  pull_request:
    branches:
      - main
    paths:
      - "netty-engineering-handbook/**"
      - ".github/workflows/handbook-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  APP_DIR: netty-engineering-handbook

concurrency:
  group: handbook-github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build handbook
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ${{ env.APP_DIR }}/.nvmrc
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Content contract
        run: npm run content:check

      - name: Study contract
        run: npm run study:check

      - name: Security content scan
        run: npm run security:content

      - name: Build application
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Start static preview
        run: |
          rm -rf /tmp/handbook-pages-preview
          mkdir -p /tmp/handbook-pages-preview/summary
          cp -R out/. /tmp/handbook-pages-preview/summary/
          npx serve@latest /tmp/handbook-pages-preview --listen 3000 > /tmp/handbook-serve.log 2>&1 &

      - name: Wait for static preview
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/summary/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/handbook-serve.log
          exit 1

      - name: Visual QA
        run: VISUAL_QA_BASE_URL=http://127.0.0.1:3000/summary npm run visual:qa

      - name: Upload visual QA artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: handbook-visual-qa
          path: |
            /tmp/netty-handbook-visual-qa-*
            /tmp/handbook-serve.log
          if-no-files-found: ignore

      - name: Prepare Pages artifact
        if: github.event_name != 'pull_request'
        run: |
          test -d out
          touch out/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.APP_DIR }}/out
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
