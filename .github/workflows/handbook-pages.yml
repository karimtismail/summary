name: Handbook CI and GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "netty-engineering-handbook/**"
      - ".github/workflows/handbook-pages.yml"
  pull_request:
    branches:
      - main
    paths:
      - "netty-engineering-handbook/**"
      - ".github/workflows/handbook-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_DIR: netty-engineering-handbook

jobs:
  validate:
    name: Validate handbook
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ${{ env.APP_DIR }}/.nvmrc
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build application
        run: npm run build

  build-pages:
    name: Build GitHub Pages artifact
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ${{ env.APP_DIR }}/.nvmrc
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Prepare Pages artifact
        run: |
          test -d out
          touch out/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.APP_DIR }}/out
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build-pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
